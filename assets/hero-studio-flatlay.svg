<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 860" width="1040" height="860" role="img" aria-label="A studio flat-lay: the tied Snail Mail Club parcel with a wax seal as the centrepiece, two framed art prints fanned beside it, an ink pot and brush, a carved printing block and a dried sprig on a warm paper table.">
  <rect width="1040" height="860" fill="#E7DDC6"/>
  <ellipse cx="520" cy="440" rx="560" ry="470" fill="#EEE6D0" opacity="0.55"/>
  <g fill="#5b5446" opacity="0.15"><circle cx="120" cy="150" r="4"/><circle cx="940" cy="160" r="4.5"/><circle cx="900" cy="520" r="4"/><circle cx="150" cy="720" r="4"/><circle cx="540" cy="800" r="4"/><circle cx="980" cy="730" r="4"/></g>

  <!-- two framed prints, fanned at the left (the portfolio) -->
  <g transform="rotate(-11 270 470)">
    <rect x="150" y="300" width="230" height="286" rx="3" fill="#F6F1E2" stroke="#9C8E6E" stroke-width="4"/>
    <rect x="164" y="314" width="202" height="258" fill="#ECE3CC"/>
    <path d="M265 556 q -26 -76 0 -136 q 26 60 0 136 M265 488 q -38 -12 -52 -32 M265 510 q 38 -12 52 -32 M265 530 q -30 -10 -42 -26 M265 466 q 34 -12 48 -30" stroke="#5E7E72" stroke-width="2.6" fill="none"/>
  </g>
  <g transform="rotate(-1 370 510)">
    <rect x="250" y="336" width="230" height="286" rx="3" fill="#F8F3E6" stroke="#9C8E6E" stroke-width="4"/>
    <rect x="264" y="350" width="202" height="258" fill="#EFE6CE"/>
    <g transform="translate(365 479)" stroke="#B68A3E" stroke-width="2" fill="none"><circle r="26"/><circle cx="26" cy="0" r="26"/><circle cx="13" cy="22.5" r="26"/><circle cx="-13" cy="22.5" r="26"/><circle cx="-26" cy="0" r="26"/><circle cx="-13" cy="-22.5" r="26"/><circle cx="13" cy="-22.5" r="26"/><circle r="65" stroke-dasharray="3 7"/></g>
  </g>

  <!-- ink pot + brush (top) -->
  <g transform="rotate(-19 612 210)">
    <rect x="560" y="180" width="104" height="74" rx="12" fill="#3B3631"/>
    <ellipse cx="612" cy="180" rx="52" ry="13" fill="#2A2622"/>
    <ellipse cx="612" cy="180" rx="30" ry="7" fill="#5E7E72"/>
  </g>
  <g transform="rotate(36 724 214)">
    <rect x="718" y="150" width="13" height="120" rx="6.5" fill="#9A7B4E"/>
    <path d="M724.5 270 q -14 22 0 40 q 14 -16 0 -40" fill="#2A2622"/>
  </g>

  <!-- the centrepiece: the tied Snail Mail Club parcel -->
  <g transform="rotate(4 722 472)">
    <rect x="556" y="346" width="332" height="252" rx="6" fill="#C9A877" stroke="#A98A5A" stroke-width="2"/>
    <rect x="556" y="346" width="332" height="252" rx="6" fill="#000000" opacity="0.04"/>
    <rect x="698" y="346" width="48" height="252" fill="#B89765" opacity="0.6"/>
    <rect x="556" y="448" width="332" height="46" fill="#B89765" opacity="0.6"/>
    <path d="M704 470 q -34 -28 -6 -52 q 18 18 42 42 q 28 -24 48 -6 q -20 18 -44 42" fill="none" stroke="#6B5B49" stroke-width="3.4"/>
  </g>
  <g transform="rotate(-8 868 446)">
    <rect x="828" y="420" width="86" height="54" rx="4" fill="#FBF6E9" stroke="#D8CBA8"/>
    <text x="871" y="442" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="15" fill="#6B5B49">Snail Mail</text>
    <text x="871" y="461" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#9A8A66">№ 7</text>
  </g>
  <g transform="translate(644 556)">
    <circle r="34" fill="#A8442F"/>
    <g fill="#7C2A20"><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(0)"/><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(45)"/><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(90)"/><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(135)"/><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(180)"/><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(225)"/><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(270)"/><path d="M0 -34 l6 9 l-12 0 z" transform="rotate(315)"/></g>
    <g stroke="#7C2A20" stroke-width="1.5" fill="none" opacity="0.9"><circle r="10"/><circle cx="10" cy="0" r="10"/><circle cx="-10" cy="0" r="10"/><circle cx="5" cy="8.5" r="10"/><circle cx="-5" cy="8.5" r="10"/><circle cx="5" cy="-8.5" r="10"/><circle cx="-5" cy="-8.5" r="10"/></g>
  </g>

  <!-- carved printing block + dried sprig (bottom) -->
  <g>
    <rect x="468" y="636" width="92" height="92" rx="6" fill="#A9824E" stroke="#7E6038" stroke-width="2"/>
    <g transform="translate(514 682)" stroke="#5C4427" stroke-width="3" fill="none"><circle r="20"/><path d="M-20 0 h40 M0 -20 v40"/></g>
  </g>
  <g transform="rotate(26 836 636)">
    <path d="M836 700 q -8 -52 0 -82" stroke="#7E8A52" stroke-width="3" fill="none"/>
    <ellipse cx="822" cy="592" rx="10" ry="20" fill="#8FA05A" transform="rotate(-22 822 592)"/>
    <ellipse cx="850" cy="596" rx="10" ry="20" fill="#8FA05A" transform="rotate(22 850 596)"/>
    <ellipse cx="836" cy="578" rx="10" ry="20" fill="#A6B56E"/>
  </g>
</svg>
