  /api/checkout/session:
    post:
      tags: [Payments]
      summary: Create a Stripe Checkout session (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderItem'
      responses:
        '200':
          description: >
            Checkout session URL, or { configured: false } when no Stripe key
            is set.
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured:
                    type: boolean
                  url:
                    type: string
                  id:
                    type: string

  /api/stripe/webhook:
    post:
      tags: [Payments]
      summary: Stripe webhook (raw body, signature verified)
      description: >
        Receives the raw request body so the Stripe signature can be verified.
        On a successful checkout event, marks the matching order paid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Event acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
